<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop</title>

    <style>
        /* =========================
           GLOBAL
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: url('images/background.webp') center center/cover no-repeat fixed;
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
        }

        /* =========================
           NAV BAR
        ========================= */
        .nav-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 35px;
            margin-bottom: 30px;
        }

        .navbar {
            width: 90%;
            max-width: 1400px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.70);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.20), 0 0 40px rgba(255, 0, 255, 0.15);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .navbar a:hover { color: #00ffee; text-shadow: 0 0 10px #00ffee; }

        /* =========================
           GRID LAYOUTS
        ========================= */
        .main-grid, .second-row {
            width: 95%;
            max-width: 1800px;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr auto 1fr; 
            gap: 30px;
            align-items: center;
            justify-items: center;
            padding: 20px;
        }

        /* =========================
           IMAGE BOX & INDEPENDENT SINGLE COLOR GLOW
        ========================= */
        .image-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            min-width: 320px; /* Ensures the box doesn't collapse */
            min-height: 350px;
        }

        /* The Glow (Pseudo-element) */
        .image-box::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            z-index: 1; /* Glow stays in the back */
            filter: blur(25px);
            opacity: 0.6;
            animation: cycleSingleColor 12s linear infinite;
            pointer-events: none; /* Allows clicks to pass through to the image */
        }

        @keyframes cycleSingleColor {
            0%, 100% { background: rgba(255, 0, 0, 0.8); box-shadow: 0 0 40px 10px rgba(255, 0, 0, 0.5); }
            16% { background: rgba(255, 255, 0, 0.8); box-shadow: 0 0 40px 10px rgba(255, 255, 0, 0.5); }
            33% { background: rgba(0, 255, 0, 0.8); box-shadow: 0 0 40px 10px rgba(0, 255, 0, 0.5); }
            50% { background: rgba(0, 255, 255, 0.8); box-shadow: 0 0 40px 10px rgba(0, 255, 255, 0.5); }
            66% { background: rgba(0, 0, 255, 0.8); box-shadow: 0 0 40px 10px rgba(0, 0, 255, 0.5); }
            83% { background: rgba(255, 0, 255, 0.8); box-shadow: 0 0 40px 10px rgba(255, 0, 255, 0.5); }
        }

        .pick-1::before { animation-delay: 0s; }
        .pick-2::before { animation-delay: -3s; }
        .pick-3::before { animation-delay: -6s; }
        .pick-4::before { animation-delay: -9s; }

        /* =========================
           LOGO ADJUSTMENTS
        ========================= */
        .logo-container { margin-top: -80px; }
        .logo-container img { width: 700px !important; height: auto; }
        .logo-container::before { width: 300px; height: 300px; animation-delay: -4s; }

        /* =========================
           THE IMAGES (PICK IMAGES)
        ========================= */
        .image-box img {
            display: block; /* Ensures they aren't hidden by default */
            position: relative;
            z-index: 10; /* Forces images to the top layer */
            width: 300px; 
            height: auto;
            border-radius: 20px;
            animation: floatingPick 6s ease-in-out infinite;
            transition: transform 0.4s ease;
        }

        .image-box:hover img { transform: scale(1.1); }

        @keyframes floatingPick {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        /* =========================
           FOOTER & RESPONSIVE
        ========================= */
        footer { margin-top: 60px; text-align: center; color: #00ffee; text-shadow: 0 0 10px #00ffee; }

        @media(max-width: 1000px) {
            .main-grid, .second-row { grid-template-columns: 1fr; }
            .logo-container { margin-top: 0; }
            .row-spacer { display: none; }
        }
    </style>
</head>

<body>

    <div class="nav-wrapper">
        <nav class="navbar">
            <a href="we-are-here.html">Who We Are</a>
            <a href="services.html">Guitar Services</a>
            <a href="priors.html">Prior Projects</a>
            <a href="forums.html">Guitar Forums</a>
        </nav>
    </div>

    <section class="main-grid">
        <div class="image-box pick-1">
            <a href="index.html"><img src="images/guitarshop.webp" alt="Guitar Shop"></a>
        </div>
        <div class="image-box logo-container">
            <img src="images/hippychipslogo.webp" alt="Logo">
        </div>
        <div class="image-box pick-2">
            <a href="forums.html"><img src="images/guitarforums.webp" alt="Forums"></a>
        </div>
    </section>

    <section class="second-row">
        <div class="image-box pick-3">
            <a href="services.html"><img src="images/guitar-repair.webp" alt="Repair"></a>
        </div>
        <div class="row-spacer" style="width: 700px;"></div>
        <div class="image-box pick-4">
            <a href="priors.html"><img src="images/priorprojects.webp" alt="Priors"></a>
        </div>
    </section>

    <footer>© Copyright www.hippychipsguitars.com</footer>

</body>
</html>
