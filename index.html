<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop</title>

    <style>
        /* =========================
           GLOBAL & BACKGROUND
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: url('./images/background.webp') center center/cover no-repeat fixed;
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
        }

        /* =========================
           NAV BAR
        ========================= */
        .nav-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 25px;
            margin-bottom: 10px;
        }

        .navbar {
            padding: 15px 40px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 100;
            position: relative;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* =========================
           GRID ALIGNMENT
        ========================= */
        .main-grid, .second-row {
            width: 90%;
            max-width: 1400px;
            margin: auto;
            display: grid;
            /* 300px side columns for perfect vertical pick alignment */
            grid-template-columns: 300px 1fr 300px; 
            gap: 20px;
            align-items: center;
            justify-items: center;
        }

        .second-row {
            margin-top: -80px; /* Pulls the lower picks up */
        }

        /* =========================
           IMAGE BOX & GLOW
        ========================= */
        .image-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 280px;
        }

        .image-box::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            z-index: 1; 
            filter: blur(25px);
            opacity: 0.6;
            animation: cycleSingleColor 12s linear infinite;
        }

        @keyframes cycleSingleColor {
            0%, 100% { background: rgba(255, 0, 0, 0.8); box-shadow: 0 0 30px 5px red; }
            16% { background: rgba(255, 255, 0, 0.8); box-shadow: 0 0 30px 5px yellow; }
            33% { background: rgba(0, 255, 0, 0.8); box-shadow: 0 0 30px 5px green; }
            50% { background: rgba(0, 255, 255, 0.8); box-shadow: 0 0 30px 5px cyan; }
            66% { background: rgba(0, 0, 255, 0.8); box-shadow: 0 0 30px 5px blue; }
            83% { background: rgba(255, 0, 255, 0.8); box-shadow: 0 0 30px 5px magenta; }
        }

        /* =========================
           LOGO ADJUSTMENT
        ========================= */
        .logo-container {
            margin-top: -60px; /* Lowered from previous to clear the nav bar */
            z-index: 2;
        }

        .logo-container img {
            width: 550px !important; 
            height: auto;
            display: block;
        }

        /* =========================
           PICK IMAGES
        ========================= */
        .image-box img {
            display: block;
            position: relative;
            z-index: 10;
            width: 240px; 
            height: auto;
            border-radius: 20px;
            animation: floating 6s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* =========================
           MOBILE
        ========================= */
        @media(max-width: 1000px) {
            .main-grid, .second-row { 
                grid-template-columns: 1fr; 
                margin-top: 0;
            }
            .logo-container { margin-top: 0; }
        }
    </style>
</head>

<body>

    <div class="nav-wrapper">
        <nav class="navbar">
            <a href="we-are-here.html">Who We Are</a>
            <a href="services.html">Guitar Services</a>
            <a href="priors.html">Prior Projects</a>
            <a href="forums.html">Guitar Forums</a>
        </nav>
    </div>

    <!-- ROW 1 -->
    <section class="main-grid">
        <div class="image-box">
            <a href="index.html">
                <img src="./images/guitarshop.webp" alt="Guitar Shop">
            </a>
        </div>

        <div class="image-box logo-container">
            <img src="./images/hippychipslogo.webp" alt="Logo">
        </div>

        <div class="image-box">
            <a href="forums.html">
                <img src="./images/guitarforums.webp" alt="Guitar Forums">
            </a>
        </div>
    </section>

    <!-- ROW 2 -->
    <section class="second-row">
        <div class="image-box">
            <a href="services.html">
                <img src="./images/guitar-repair.webp" alt="Guitar Repair">
            </a>
        </div>

        <div><!-- Empty Middle Column for Logo Space --></div>

        <div class="image-box">
            <a href="priors.html">
                <img src="./images/priorprojects.webp" alt="Prior Projects">
            </a>
        </div>
    </section>

    <footer style="text-align: center; margin-top: 20px; padding-bottom: 20px; color: #00ffee; text-shadow: 0 0 5px #00ffee;">
        © Copyright www.hippychipsguitars.com
    </footer>

</body>
</html>
