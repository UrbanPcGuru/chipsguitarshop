<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Hippy Chip's Guitar Shop</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:url('background.webp') center center/cover no-repeat fixed;
    min-height:100vh;
    overflow-x:hidden;
    color:white;
}

/* =========================
   NAVIGATION
========================= */

.nav-wrapper{
    width:100%;
    display:flex;
    justify-content:center;
    margin-top:35px;
    margin-bottom:40px;
}

.navbar{
    width:90%;
    max-width:1400px;
    background:rgba(0,0,0,0.70);
    backdrop-filter:blur(8px);
    border:2px solid rgba(255,255,255,0.15);
    border-radius:18px;
    padding:18px 25px;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;

    box-shadow:
    0 0 25px rgba(0,255,255,0.15),
    0 0 50px rgba(255,0,255,0.10);
}

.navbar a{
    text-decoration:none;
    color:#ffffff;
    font-size:1.1rem;
    font-weight:bold;
    transition:0.3s;
    letter-spacing:1px;
}

.navbar a:hover{
    color:#00ffee;

    text-shadow:
    0 0 5px #00ffee,
    0 0 15px #00ffee,
    0 0 25px #00ffee;
}

/* =========================
   MAIN GRID
========================= */

.main-container{
    width:95%;
    max-width:1600px;
    margin:auto;

    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:50px;

    align-items:center;
    justify-items:center;

    padding:20px;
}

/* =========================
   IMAGE CONTAINERS
========================= */

.image-box{
    position:relative;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:25px;

    border-radius:25px;

    overflow:hidden;
}

/* Animated color glow */

.image-box::before{
    content:'';
    position:absolute;
    width:180%;
    height:180%;

    background:
    conic-gradient(
        #ff0000,
        #ff9900,
        #ffff00,
        #00ff00,
        #00ffff,
        #0000ff,
        #ff00ff,
        #ff0000
    );

    animation:spin 8s linear infinite;

    filter:blur(60px);
    opacity:0.6;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

/* Image styling */

.image-box img{
    position:relative;
    z-index:2;

    width:100%;
    max-width:350px;

    border-radius:20px;

    transition:0.4s;

    animation:float 5s ease-in-out infinite;
}

.image-box img:hover{
    transform:scale(1.05);
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-12px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* =========================
   CENTER LOGO
========================= */

.logo-box img{
    max-width:350px;
}

/* =========================
   SECOND ROW
========================= */

.second-row{
    width:100%;
    margin-top:40px;

    display:grid;
    grid-template-columns:1fr 1fr 1fr;

    justify-items:center;
    align-items:center;
}

/* =========================
   FOOTER
========================= */

footer{
    margin-top:80px;
    margin-bottom:30px;

    text-align:center;

    font-size:1.2rem;
    font-weight:bold;
    letter-spacing:2px;

    color:#00ffee;

    text-shadow:
    0 0 5px #00ffee,
    0 0 10px #00ffee,
    0 0 20px #00ffee,
    0 0 35px #00ffee;
}

/* =========================
   MOBILE
========================= */

@media(max-width:1000px){

    .main-container{
        grid-template-columns:1fr;
    }

    .second-row{
        grid-template-columns:1fr;
        gap:40px;
    }

    .navbar{
        flex-wrap:wrap;
        gap:20px;
    }

}

</style>
</head>

<body>

<!-- =========================
     NAVIGATION BAR
========================= -->

<div class="nav-wrapper">

    <nav class="navbar">

        <a href="we-are-here.html">We Are Here</a>

        <a href="services.html">Guitar Services</a>

        <a href="priors.html">Prior Projects</a>

        <a href="forums.html">Guitar Forums</a>

    </nav>

</div>

<!-- =========================
     FIRST ROW
========================= -->

<section class="main-container">

    <!-- COLUMN 1 -->

    <div class="image-box">

        <a href="services.html">

            <img src="guitar-services.webp"
            alt="Guitar Services">

        </a>

    </div>

    <!-- COLUMN 2 -->

    <div class="image-box logo-box">

        <img src="chipslogo.webp"
        alt="Chip's Guitar Shop Logo">

    </div>

    <!-- COLUMN 3 -->

    <div class="image-box">

        <a href="forums.html">

            <img src="guitar-forums.webp"
            alt="Guitar Forums">

        </a>

    </div>

</section>

<!-- =========================
     SECOND ROW
========================= -->

<section class="second-row">

    <!-- COLUMN 1 -->

    <div class="image-box">

        <a href="prior.html">

            <img src="prior-projects.webp"
            alt="Prior Projects">

        </a>

    </div>

    <!-- COLUMN 2 SPACER -->

    <div></div>

    <!-- COLUMN 3 SPACER -->

    <div></div>

</section>

<!-- =========================
     FOOTER
========================= -->

<footer>

    © Copyright
    www.hippychipsguitars.com

</footer>

</body>
</html>
