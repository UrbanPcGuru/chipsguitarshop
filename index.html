<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop</title>

    <style>
        /* =========================
           GLOBAL SETUP
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: url('./images/background.webp') center center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            color: white;
        }

        /* =========================
           NAVIGATION
        ========================= */
        .nav-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 25px;
            z-index: 100;
        }

        .navbar {
            padding: 15px 40px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* =========================
           3-COLUMN LAYOUT
        ========================= */
        .main-container {
            flex: 1;
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            align-items: center; 
            justify-items: center;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 50px;
        }

        /* LOGO COLUMN (Center) */
        .logo-column {
            display: flex;
            justify-content: center;
            align-items: center;
            /* Lowered further from -40px to -20px */
            margin-top: -20px; 
        }

        .logo-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ULTRA-LOW LOGO GLOW: Corrected Size */
        .logo-container::before {
            content: '';
            position: absolute;
            width: 638px; /* Strict 4px margin past the 630px logo */
            height: 638px; 
            border-radius: 50%;
            z-index: 1;
            filter: blur(4px); 
            opacity: 0.5;
            animation: cycleLogoGlow 15s linear infinite;
        }

        .logo-container img {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 630px; 
            height: auto;
            display: block;
        }

        @keyframes cycleLogoGlow {
            0%   { background: red; box-shadow: 0 0 5px red; }
            16%  { background: yellow; box-shadow: 0 0 5px yellow; }
            33%  { background: green; box-shadow: 0 0 5px green; }
            50%  { background: cyan; box-shadow: 0 0 5px cyan; }
            66%  { background: blue; box-shadow: 0 0 5px blue; }
            83%  { background: magenta; box-shadow: 0 0 5px magenta; }
            100% { background: red; box-shadow: 0 0 5px red; }
        }

        /* PICKS COLUMNS (Left & Right) */
        .picks-column {
            display: flex;
            flex-direction: column;
            gap: 100px; /* Spacing between top and bottom picks */
            justify-content: center;
        }

        .image-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* RESTORED PICK GLOWS (Auras) */
        .image-box::before {
            content: '';
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            z-index: 1; 
            filter: blur(25px);
            opacity: 0.6;
            animation: cyclePickGlow 12s linear infinite;
        }

        /* Animation Offsets for Variety */
        .pick-1::before { animation-delay: 0s; }
        .pick-2::before { animation-delay: -3s; }
        .pick-3::before { animation-delay: -6s; }
        .pick-4::before { animation-delay: -9s; }

        @keyframes cyclePickGlow {
            0%   { background: red; }
            33%  { background: green; }
            66%  { background: blue; }
            100% { background: red; }
        }

        .image-box img {
            position: relative;
            z-index: 10;
            width: 220px; 
            height: auto;
            border-radius: 15px;
            animation: floating 6s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 30px 0;
            color: #00ffee;
            text-shadow: 0 0 10px rgba(0, 255, 238, 0.8);
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="nav-wrapper">
        <nav class="navbar">
            <a href="we-are-here.html">Who We Are</a>
            <a href="services.html">Guitar Services</a>
            <a href="priors.html">Prior Projects</a>
            <a href="forums.html">Guitar Forums</a>
        </nav>
    </div>

    <div class="main-container">
        
        <!-- LEFT PICKS -->
        <div class="picks-column">
            <div class="image-box pick-1">
                <a href="index.html"><img src="./images/guitarshop.webp" alt="Shop"></a>
            </div>
            <div class="image-box pick-2">
                <a href="services.html"><img src="./images/guitar-repair.webp" alt="Repair"></a>
            </div>
        </div>

        <!-- CENTER LOGO -->
        <div class="logo-column">
            <div class="logo-container">
                <img src="./images/hippychipslogo.webp" alt="Logo">
            </div>
        </div>

        <!-- RIGHT PICKS -->
        <div class="picks-column">
            <div class="image-box pick-3">
                <a href="forums.html"><img src="./images/guitarforums.webp" alt="Forums"></a>
            </div>
            <div class="image-box pick-4">
                <a href="priors.html"><img src="./images/priorprojects.webp" alt="Priors"></a>
            </div>
        </div>

    </div>

    <footer>
        © Copyright www.hippychipsguitars.com
    </footer>

</body>
</html>
