<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop</title>

    <style>
        /* =========================
           GLOBAL SETUP
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: url('./images/background.webp') center center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            color: white;
        }

        /* =========================
           NAVIGATION
        ========================= */
        .nav-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 25px;
            z-index: 100;
        }

        .navbar {
            padding: 15px 40px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* =========================
           FIXED COLUMN GRID 
           Forces perfect vertical alignment
        ========================= */
        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
        }

        .content-grid {
            display: grid;
            /* Side columns set to a fixed 280px to lock vertical alignment */
            grid-template-columns: 280px 650px 280px;
            align-items: center;
            justify-items: center;
            column-gap: 20px;
            row-gap: 30px;
        }

        /* =========================
           LOGO ADJUSTMENT
        ========================= */
        .logo-container {
            grid-row: span 2; 
            margin-top: 85px; /* Centers logo in the circular wall space */
        }

        .logo-container img {
            width: 100%;
            max-width: 630px; /* Slightly larger for impact */
            height: auto;
            display: block;
        }

        /* =========================
           PICK IMAGES & GLOWS
        ========================= */
        .image-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 250px;
            width: 100%; 
        }

        .image-box::before {
            content: '';
            position: absolute;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            z-index: 1; 
            filter: blur(25px);
            opacity: 0.6;
            animation: cycleSingleColor 12s linear infinite;
        }

        @keyframes cycleSingleColor {
            0%, 100% { background: red; box-shadow: 0 0 30px red; }
            20% { background: yellow; box-shadow: 0 0 30px yellow; }
            40% { background: green; box-shadow: 0 0 30px green; }
            60% { background: cyan; box-shadow: 0 0 30px cyan; }
            80% { background: magenta; box-shadow: 0 0 30px magenta; }
        }

        .image-box img {
            position: relative;
            z-index: 10;
            width: 230px; 
            height: auto;
            border-radius: 15px;
            animation: floating 6s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* =========================
           FOOTER (PINNED TO BOTTOM)
        ========================= */
        footer {
            text-align: center;
            padding: 40px 0;
            color: #00ffee;
            text-shadow: 0 0 10px rgba(0, 255, 238, 0.8);
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* =========================
           MOBILE OVERRIDE
        ========================= */
        @media(max-width: 1250px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
            .logo-container {
                grid-row: auto;
                margin-top: 20px;
                order: -1;
            }
        }
    </style>
</head>

<body>

    <div class="nav-wrapper">
        <nav class="navbar">
            <a href="we-are-here.html">Who We Are</a>
            <a href="services.html">Guitar Services</a>
            <a href="priors.html">Prior Projects</a>
            <a href="forums.html">Guitar Forums</a>
        </nav>
    </div>

    <div class="main-container">
        <div class="content-grid">
            
            <!-- LEFT TOP PICK -->
            <div class="image-box">
                <a href="index.html"><img src="./images/guitarshop.webp" alt="Shop"></a>
            </div>

            <!-- CENTER LOGO -->
            <div class="logo-container">
                <img src="./images/hippychipslogo.webp" alt="Logo">
            </div>

            <!-- RIGHT TOP PICK -->
            <div class="image-box">
                <a href="forums.html"><img src="./images/guitarforums.webp" alt="Forums"></a>
            </div>

            <!-- LEFT BOTTOM PICK -->
            <div class="image-box">
                <a href="services.html"><img src="./images/guitar-repair.webp" alt="Repair"></a>
            </div>

            <!-- RIGHT BOTTOM PICK (Locked under Forums) -->
            <div class="image-box">
                <a href="priors.html"><img src="./images/priorprojects.webp" alt="Priors"></a>
            </div>

        </div>
    </div>

    <footer>
        © Copyright www.hippychipsguitars.com
    </footer>

</body>
</html>
