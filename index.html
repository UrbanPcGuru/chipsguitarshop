<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop</title>

    <style>
        /* =========================
           GLOBAL
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: url('images/background.webp') center center/cover no-repeat fixed;
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
        }

        /* =========================
           NAV BAR
        ========================= */
        .nav-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 35px;
            margin-bottom: 50px;
        }

        .navbar {
            width: 90%;
            max-width: 1400px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.70);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.20), 0 0 40px rgba(255, 0, 255, 0.15);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .navbar a:hover {
            color: #00ffee;
            text-shadow: 0 0 5px #00ffee, 0 0 10px #00ffee, 0 0 20px #00ffee;
        }

        /* =========================
           GRID LAYOUTS
        ========================= */
        .main-grid, .second-row {
            width: 95%;
            max-width: 1600px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px;
            align-items: center;
            justify-items: center;
            padding: 20px;
        }

        /* =========================
           IMAGE BOX & STARBURST GLOW
        ========================= */
        .image-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            /* No overflow:hidden to allow light to leak out */
        }

        /* The 6-Color Starburst Glow (Behind Image) */
        .image-box::before {
            content: '';
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, 
                rgba(255,0,0,0.8) 0%, 
                rgba(255,255,0,0.6) 20%, 
                rgba(0,255,0,0.5) 40%, 
                rgba(0,255,255,0.4) 60%, 
                rgba(0,0,255,0.3) 80%, 
                transparent 100%
            );
            filter: blur(40px);
            z-index: 1; 
            opacity: 0.7;
            transition: all 0.5s ease-in-out;
            animation: pulseGlow 4s infinite alternate;
        }

        /* Hover: Turn Bright Green and Grow */
        .image-box:hover::before {
            background: radial-gradient(circle, 
                rgba(0, 255, 0, 1) 0%, 
                rgba(0, 255, 0, 0.6) 50%, 
                transparent 100%
            );
            width: 350px;
            height: 350px;
            filter: blur(50px);
            opacity: 1;
            animation: none; /* Stops pulsing to stay solid green */
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.2); opacity: 0.9; }
        }

        /* =========================
           FLOATING IMAGES
        ========================= */
        .image-box img {
            position: relative;
            z-index: 2; /* Ensures image stays in front of light */
            width: 100%;
            max-width: 300px;
            border-radius: 20px;
            background: transparent;
            border: none;
            animation: float 5s ease-in-out infinite;
            transition: transform 0.4s ease-in-out;
        }

        .image-box:hover img {
            transform: scale(1.15); /* Gets larger on hover */
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* =========================
           FOOTER
        ========================= */
        footer {
            margin-top: 80px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #00ffee;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ffee, 0 0 20px #00ffee;
        }

        /* =========================
           MOBILE RESPONSIVENESS
        ========================= */
        @media(max-width: 1000px) {
            .main-grid, .second-row {
                grid-template-columns: 1fr;
                gap: 60px;
            }
            .navbar {
                flex-wrap: wrap;
                gap: 20px;
            }
        }
    </style>
</head>

<body>

    <!-- NAVIGATION -->
    <div class="nav-wrapper">
        <nav class="navbar">
            <a href="we-are-here.html">Who We Are</a>
            <a href="services.html">Guitar Services</a>
            <a href="priors.html">Prior Projects</a>
            <a href="forums.html">Guitar Forums</a>
        </nav>
    </div>

    <!-- FIRST ROW -->
    <section class="main-grid">
        <div class="image-box">
            <a href="index.html">
                <img src="images/guitarshop.webp" alt="Guitar Shop">
            </a>
        </div>

        <div class="image-box logo-box">
            <img src="images/hippychipslogo.webp" alt="Hippy Chip's Guitar Shop Logo">
        </div>

        <div class="image-box">
            <a href="forums.html">
                <img src="images/guitarforums.webp" alt="Guitar Forums">
            </a>
        </div>
    </section>

    <!-- SECOND ROW -->
    <section class="second-row">
        <div class="image-box">
            <a href="services.html">
                <img src="images/guitar-repair.webp" alt="Guitar Repair Services">
            </a>
        </div>

        <div class="image-box">
            <a href="priors.html">
                <img src="images/priorprojects.webp" alt="Prior Projects">
            </a>
        </div>

        <!-- Spacer for 3-column layout alignment -->
        <div></div>
    </section>

    <!-- FOOTER -->
    <footer>
        © Copyright www.hippychipsguitars.com
    </footer>

</body>

</html>
