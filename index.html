<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop</title>

    <style>
        /* =========================
           GLOBAL
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: url('images/background.webp') center center/cover no-repeat fixed;
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
        }

        /* =========================
           NAV BAR
        ========================= */
        .nav-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 35px;
            margin-bottom: 50px;
        }

        .navbar {
            width: 90%;
            max-width: 1400px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.70);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.20), 0 0 40px rgba(255, 0, 255, 0.15);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .navbar a:hover {
            color: #00ffee;
            text-shadow: 0 0 5px #00ffee, 0 0 10px #00ffee, 0 0 20px #00ffee;
        }

        /* =========================
           MAIN GRID
        ========================= */
        .main-grid {
            width: 95%;
            max-width: 1600px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px;
            align-items: center;
            justify-items: center;
            padding: 20px;
        }

        /* =========================
           IMAGE BOX
        ========================= */
        .image-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
            border-radius: 25px;
            overflow: hidden;
        }

        /* Animated Glow */
        .image-box::before {
            content: '';
            position: absolute;
            width: 180%;
            height: 180%;
            background: conic-gradient(#ff0000, #ff9900, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            animation: spin 8s linear infinite;
            filter: blur(60px);
            opacity: 0.6;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* =========================
           FLOATING IMAGES
        ========================= */
        .image-box img {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 350px;
            border-radius: 20px;
            animation: float 5s ease-in-out infinite;
            transition: 0.4s;
        }

        .image-box img:hover {
            transform: scale(1.05);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        /* =========================
           LOGO SPECIFIC
        ========================= */
        .logo-box img {
            max-width: 350px;
            animation: none; /* Logo doesn't necessarily need the float unless you want it */
        }

        /* =========================
           SECOND ROW
        ========================= */
        .second-row {
            width: 95%;
            max-width: 1600px;
            margin: auto;
            margin-top: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            justify-items: center;
            align-items: center;
        }

        /* =========================
           FOOTER
        ========================= */
        footer {
            margin-top: 80px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #00ffee;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00ffee, 0 0 10px #00ffee, 0 0 20px #00ffee, 0 0 40px #00ffee;
        }

        /* =========================
           MOBILE
        ========================= */
        @media(max-width: 1000px) {
            .main-grid, .second-row {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .navbar {
                flex-wrap: wrap;
                gap: 20px;
            }
        }
    </style>
</head>

<body>

    <!-- =========================
         NAVIGATION
    ========================= -->
    <div class="nav-wrapper">
        <nav class="navbar">
            <a href="we-are-here.html">We Are Here</a>
            <a href="services.html">Guitar Services</a>
            <a href="priors.html">Prior Projects</a>
            <a href="forums.html">Guitar Forums</a>
        </nav>
    </div>

    <!-- =========================
         FIRST ROW
    ========================= -->
    <section class="main-grid">

        <!-- COLUMN 1: Guitar Shop/Home -->
        <div class="image-box">
            <a href="index.html">
                <img src="images/guitarshop.webp" alt="Guitar Shop">
            </a>
        </div>

        <!-- COLUMN 2: Logo -->
        <div class="image-box logo-box">
            <img src="images/hippychipslogo.webp" alt="Hippy Chip's Guitar Shop Logo">
        </div>

        <!-- COLUMN 3: Guitar Forums -->
        <div class="image-box">
            <a href="forums.html">
                <img src="images/guitarforums.webp" alt="Guitar Forums">
            </a>
        </div>

    </section>

    <!-- =========================
         SECOND ROW
    ========================= -->
    <section class="second-row">

        <!-- COLUMN 1: Guitar Repair/Services -->
        <div class="image-box">
            <a href="services.html">
                <img src="images/guitar-repair.webp" alt="Guitar Repair Services">
            </a>
        </div>

        <!-- COLUMN 2: Prior Projects -->
        <div class="image-box">
            <a href="priors.html">
                <img src="images/priorprojects.webp" alt="Prior Projects">
            </a>
        </div>

        <!-- COLUMN 3: Empty (Keeps the 3-column grid alignment) -->
        <div></div>

    </section>

    <!-- =========================
         FOOTER
    ========================= -->
    <footer>
        © Copyright www.hippychipsguitars.com
    </footer>

</body>

</html>
