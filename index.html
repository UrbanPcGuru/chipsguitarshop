<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop</title>

    <style>
        /* =========================
           GLOBAL SETUP
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: url('./images/background.webp') center center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            color: white;
        }

        /* =========================
           NAVIGATION
        ========================= */
        .nav-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 25px;
            z-index: 1000;
        }

        .navbar {
            padding: 15px 40px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* =========================
           3-COLUMN LAYOUT
        ========================= */
        .main-container {
            flex: 1;
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            align-items: center; 
            justify-items: center;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 50px;
        }

        /* LOGO COLUMN (Center) */
        .logo-column {
            display: flex;
            justify-content: center;
            align-items: center;
            /* Lowered further as requested */
            margin-top: 20px; 
        }

        .logo-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 630px;
            height: 630px;
        }

        /* TIGHT ANIMATED GLOW - 4px Limit */
        .logo-container::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%;
            z-index: 1;
            /* Ensuring blur doesn't make it look "huge" like in image_2d26d1.jpg */
            filter: blur(5px);
            animation: cycleLogoGlow 10s linear infinite;
        }

        .logo-container img {
            position: relative;
            z-index: 10;
            width: 630px;
            height: 630px;
            display: block;
        }

        @keyframes cycleLogoGlow {
            0%   { box-shadow: 0 0 10px red; background: rgba(255, 0, 0, 0.2); }
            20%  { box-shadow: 0 0 10px yellow; background: rgba(255, 255, 0, 0.2); }
            40%  { box-shadow: 0 0 10px green; background: rgba(0, 255, 0, 0.2); }
            60%  { box-shadow: 0 0 10px cyan; background: rgba(0, 255, 255, 0.2); }
            80%  { box-shadow: 0 0 10px blue; background: rgba(0, 0, 255, 0.2); }
            100% { box-shadow: 0 0 10px red; background: rgba(255, 0, 0, 0.2); }
        }

        /* PICKS COLUMNS (Left & Right) */
        .picks-column {
            display: flex;
            flex-direction: column;
            gap: 120px; 
            justify-content: center;
        }

        .image-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .image-box:hover {
            transform: scale(1.1);
        }

        /* RESTORED PICK GLOWS */
        .image-box::after {
            content: '';
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            z-index: 1; 
            filter: blur(25px);
            opacity: 0.7;
            animation: cyclePickGlow 8s linear infinite;
        }

        /* Offsets for variety */
        .pick-1::after { animation-delay: 0s; }
        .pick-2::after { animation-delay: -2s; }
        .pick-3::after { animation-delay: -4s; }
        .pick-4::after { animation-delay: -6s; }

        @keyframes cyclePickGlow {
            0%   { background: red; box-shadow: 0 0 20px red; }
            33%  { background: green; box-shadow: 0 0 20px green; }
            66%  { background: blue; box-shadow: 0 0 20px blue; }
            100% { background: red; box-shadow: 0 0 20px red; }
        }

        .image-box img {
            position: relative;
            z-index: 10;
            width: 220px; 
            height: auto;
            border-radius: 15px;
            animation: floating 6s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 30px 0;
            color: #00ffee;
            text-shadow: 0 0 10px rgba(0, 255, 238, 0.8);
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="nav-wrapper">
        <nav class="navbar">
            <a href="we-are-here.html">Who We Are</a>
            <a href="services.html">Guitar Services</a>
            <a href="priors.html">Prior Projects</a>
            <a href="forums.html">Guitar Forums</a>
        </nav>
    </div>

    <div class="main-container">
        
        <!-- LEFT PICKS -->
        <div class="picks-column">
            <div class="image-box pick-1">
                <a href="index.html"><img src="./images/guitarshop.webp" alt="Shop"></a>
            </div>
            <div class="image-box pick-2">
                <a href="services.html"><img src="./images/guitar-repair.webp" alt="Repair"></a>
            </div>
        </div>

        <!-- CENTER LOGO -->
        <div class="logo-column">
            <div class="logo-container">
                <img src="./images/hippychipslogo.webp" alt="Logo">
            </div>
        </div>

        <!-- RIGHT PICKS -->
        <div class="picks-column">
            <div class="image-box pick-3">
                <a href="forums.html"><img src="./images/guitarforums.webp" alt="Forums"></a>
            </div>
            <div class="image-box pick-4">
                <a href="priors.html"><img src="./images/priorprojects.webp" alt="Priors"></a>
            </div>
        </div>

    </div>

    <footer>
        © Copyright www.hippychipsguitars.com
    </footer>

</body>
</html>
