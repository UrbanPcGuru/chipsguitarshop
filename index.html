<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop</title>

    <style>
        /* =========================
           GLOBAL
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: url('images/background.webp') center center/cover no-repeat fixed;
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
        }

        /* =========================
           NAV BAR
        ========================= */
        .nav-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 35px;
            margin-bottom: 50px;
        }

        .navbar {
            width: 90%;
            max-width: 1400px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.70);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.20), 0 0 40px rgba(255, 0, 255, 0.15);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .navbar a:hover {
            color: #00ffee;
            text-shadow: 0 0 5px #00ffee, 0 0 10px #00ffee, 0 0 20px #00ffee;
        }

        /* =========================
           GRID LAYOUTS
        ========================= */
        .main-grid, .second-row {
            width: 95%;
            max-width: 1800px;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr auto 1fr; 
            gap: 50px;
            align-items: center;
            justify-items: center;
            padding: 20px;
        }

        /* =========================
           IMAGE BOX & INDEPENDENT SINGLE COLOR GLOW
        ========================= */
        .image-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }

        .image-box::before {
            content: '';
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            z-index: 1; 
            filter: blur(25px);
            opacity: 0.7;
            /* Tight glow that cycles through colors */
            animation: cycleSingleColor 12s linear infinite;
            transition: all 0.5s ease-in-out;
        }

        /* Hover State: Lock to bright green */
        .image-box:hover::before {
            background: rgba(0, 255, 0, 0.8);
            box-shadow: 0 0 50px 20px rgba(0, 255, 0, 1);
            animation: none;
            width: 200px;
            height: 200px;
            opacity: 1;
        }

        /* Animation: Each pick cycles through 6 colors separately */
        @keyframes cycleSingleColor {
            0%, 100% { background: rgba(255, 0, 0, 0.8); box-shadow: 0 0 40px 10px rgba(255, 0, 0, 0.6); }
            16% { background: rgba(255, 255, 0, 0.8); box-shadow: 0 0 40px 10px rgba(255, 255, 0, 0.6); }
            33% { background: rgba(0, 255, 0, 0.8); box-shadow: 0 0 40px 10px rgba(0, 255, 0, 0.6); }
            50% { background: rgba(0, 255, 255, 0.8); box-shadow: 0 0 40px 10px rgba(0, 255, 255, 0.6); }
            66% { background: rgba(0, 0, 255, 0.8); box-shadow: 0 0 40px 10px rgba(0, 0, 255, 0.6); }
            83% { background: rgba(255, 0, 255, 0.8); box-shadow: 0 0 40px 10px rgba(255, 0, 255, 0.6); }
        }

        /* Offset the timing so they aren't the same color at the same time */
        .pick-1::before { animation-delay: 0s; }
        .pick-2::before { animation-delay: -3s; }
        .pick-3::before { animation-delay: -6s; }
        .pick-4::before { animation-delay: -9s; }

        /* LOGO SPECIFIC */
        .logo-container img {
            max-width: 900px !important; 
        }
        .logo-container::before {
            width: 400px; 
            height: 400px;
            animation-delay: -4s; /* Different timing for logo glow */
        }

        /* =========================
           FLOATING IMAGES
        ========================= */
        .image-box img {
            position: relative;
            z-index: 2; 
            width: 100%;
            max-width: 320px;
            border-radius: 20px;
            background: transparent;
            border: none;
            animation: floatingPick 6s ease-in-out infinite;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .image-box:hover img {
            transform: scale(1.1);
        }

        @keyframes floatingPick {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-18px) rotate(3deg); }
        }

        /* =========================
           FOOTER
        ========================= */
        footer {
            margin-top: 80px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #00ffee;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ffee, 0 0 20px #00ffee;
        }

        /* =========================
           MOBILE
        ========================= */
        @media(max-width: 1000px) {
            .main-grid, .second-row {
                grid-template-columns: 1fr;
                gap: 70px;
            }
            .logo-container img {
                max-width: 80% !important;
            }
        }
    </style>
</head>

<body>

    <!-- NAVIGATION -->
    <div class="nav-wrapper">
        <nav class="navbar">
            <a href="we-are-here.html">Who We Are</a>
            <a href="services.html">Guitar Services</a>
            <a href="priors.html">Prior Projects</a>
            <a href="forums.html">Guitar Forums</a>
        </nav>
    </div>

    <!-- MAIN GRID (ROW 1) -->
    <section class="main-grid">
        <div class="image-box pick-1">
            <a href="index.html">
                <img src="images/guitarshop.webp" alt="Guitar Shop">
            </a>
        </div>

        <div class="image-box logo-container">
            <img src="images/hippychipslogo.webp" alt="Hippy Chip's Guitar Shop Logo">
        </div>

        <div class="image-box pick-2">
            <a href="forums.html">
                <img src="images/guitarforums.webp" alt="Guitar Forums">
            </a>
        </div>
    </section>

    <!-- SECOND ROW -->
    <section class="second-row">
        <div class="image-box pick-3">
            <a href="services.html">
                <img src="images/guitar-repair.webp" alt="Guitar Repair Services">
            </a>
        </div>

        <!-- SPACER - Correctly sized for the logo column -->
        <div style="width: 900px; display: block;"></div>

        <div class="image-box pick-4">
            <a href="priors.html">
                <img src="images/priorprojects.webp" alt="Prior Projects">
            </a>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        © Copyright www.hippychipsguitars.com
    </footer>

</body>

</html>
