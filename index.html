<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop</title>

    <style>
        /* =========================
           GLOBAL
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: url('./images/background.webp') center center/cover no-repeat fixed;
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
        }

        /* =========================
           NAV BAR
        ========================= */
        .nav-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 35px;
            margin-bottom: 20px;
        }

        .navbar {
            width: 90%;
            max-width: 1400px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.70);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* =========================
           GRID LAYOUTS
        ========================= */
        .main-grid, .second-row {
            width: 95%;
            max-width: 1800px;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr auto 1fr; 
            gap: 20px;
            align-items: center;
            justify-items: center;
        }

        /* =========================
           IMAGE BOX & GLOW
        ========================= */
        .image-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 320px;
            min-width: 320px;
        }

        .image-box::before {
            content: '';
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            z-index: 1; 
            filter: blur(25px);
            opacity: 0.6;
            animation: cycleSingleColor 12s linear infinite;
        }

        @keyframes cycleSingleColor {
            0%, 100% { background: rgba(255, 0, 0, 0.8); box-shadow: 0 0 35px 5px red; }
            16% { background: rgba(255, 255, 0, 0.8); box-shadow: 0 0 35px 5px yellow; }
            33% { background: rgba(0, 255, 0, 0.8); box-shadow: 0 0 35px 5px green; }
            50% { background: rgba(0, 255, 255, 0.8); box-shadow: 0 0 35px 5px cyan; }
            66% { background: rgba(0, 0, 255, 0.8); box-shadow: 0 0 35px 5px blue; }
            83% { background: rgba(255, 0, 255, 0.8); box-shadow: 0 0 35px 5px magenta; }
        }

        .pick-1::before { animation-delay: 0s; }
        .pick-2::before { animation-delay: -3s; }
        .pick-3::before { animation-delay: -6s; }
        .pick-4::before { animation-delay: -9s; }

        /* =========================
           LOGO RAISE & SIZE
        ========================= */
        .logo-container {
            margin-top: -150px; /* Pulls logo significantly higher */
            z-index: 2;
        }

        .logo-container img {
            width: 600px !important; /* Slightly smaller to fit better */
            height: auto;
            display: block;
        }

        /* =========================
           PICK IMAGES VISIBILITY
        ========================= */
        .image-box img {
            display: block;
            position: relative;
            z-index: 10; /* Ensures images stay on top */
            width: 280px; 
            height: auto;
            border-radius: 20px;
            animation: floating 6s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .row-spacer {
            width: 600px; /* Matches the new logo width */
        }

        /* =========================
           MOBILE
        ========================= */
        @media(max-width: 1000px) {
            .main-grid, .second-row { grid-template-columns: 1fr; }
            .logo-container { margin-top: 0; }
            .row-spacer { display: none; }
        }
    </style>
</head>

<body>

    <div class="nav-wrapper">
        <nav class="navbar">
            <a href="we-are-here.html">Who We Are</a>
            <a href="services.html">Guitar Services</a>
            <a href="priors.html">Prior Projects</a>
            <a href="forums.html">Guitar Forums</a>
        </nav>
    </div>

    <section class="main-grid">
        <div class="image-box pick-1">
            <a href="index.html">
                <img src="./images/guitarshop.webp" alt="Guitar Shop">
            </a>
        </div>

        <div class="image-box logo-container">
            <img src="./images/hippychipslogo.webp" alt="Logo">
        </div>

        <div class="image-box pick-2">
            <a href="forums.html">
                <img src="./images/guitarforums.webp" alt="Guitar Forums">
            </a>
        </div>
    </section>

    <section class="second-row">
        <div class="image-box pick-3">
            <a href="services.html">
                <img src="./images/guitar-repair.webp" alt="Guitar Repair">
            </a>
        </div>

        <div class="row-spacer"></div>

        <div class="image-box pick-4">
            <a href="priors.html">
                <img src="./images/priorprojects.webp" alt="Prior Projects">
            </a>
        </div>
    </section>

    <footer style="text-align: center; margin: 40px 0; color: #00ffee;">
        © Copyright www.hippychipsguitars.com
    </footer>

</body>
</html>
