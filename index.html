<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop</title>

    <style>
        /* =========================
           GLOBAL SETUP
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: url('./images/background.webp') center center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            color: white;
        }

        /* =========================
           NAVIGATION
        ========================= */
        .nav-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 25px;
            z-index: 100;
        }

        .navbar {
            padding: 15px 40px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* =========================
           STABILIZED GRID SYSTEM
           Forces 2 on left, Logo center, 2 on right
        ========================= */
        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 50px;
        }

        .content-grid {
            display: grid;
            /* Column 1: Left Picks | Column 2: Logo | Column 3: Right Picks */
            grid-template-columns: 300px 1fr 300px;
            grid-template-rows: 1fr 1fr;
            align-items: center;
            justify-items: center;
            width: 100%;
            max-width: 1400px;
            /* Vertical padding between the top and bottom rows */
            row-gap: 80px; 
        }

        /* =========================
           LOGO POSITIONING & LARGE GLOW
        ========================= */
        .logo-container {
            grid-column: 2;
            grid-row: 1 / span 2; /* Center logo between both rows */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: -180px; /* Aligned with background sphere */
        }

        .logo-container::before {
            content: '';
            position: absolute;
            /* Size extends beyond logo diameter */
            width: 700px; 
            height: 700px; 
            border-radius: 50%;
            z-index: 1;
            filter: blur(80px); 
            opacity: 0.5;
            animation: cycleColors 15s linear infinite;
            animation-delay: -5s; 
        }

        .logo-container img {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 630px;
            height: auto;
            display: block;
        }

        /* =========================
           PICK PLACEMENT (CORNER LOCK)
        ========================= */
        .pick-1 { grid-column: 1; grid-row: 1; } /* Top Left */
        .pick-3 { grid-column: 1; grid-row: 2; } /* Bottom Left */
        .pick-2 { grid-column: 3; grid-row: 1; } /* Top Right */
        .pick-4 { grid-column: 3; grid-row: 2; } /* Bottom Right */

        .image-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .image-box::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            z-index: 1; 
            filter: blur(30px);
            opacity: 0.6;
            animation: cycleColors 12s linear infinite;
        }

        /* Staggered delays so no two colors match */
        .pick-1::before { animation-delay: 0s; }
        .pick-2::before { animation-delay: -3s; }
        .pick-3::before { animation-delay: -6s; }
        .pick-4::before { animation-delay: -9s; }

        @keyframes cycleColors {
            0%   { background: red; box-shadow: 0 0 30px red; }
            16%  { background: yellow; box-shadow: 0 0 30px yellow; }
            33%  { background: green; box-shadow: 0 0 30px green; }
            50%  { background: cyan; box-shadow: 0 0 30px cyan; }
            66%  { background: blue; box-shadow: 0 0 30px blue; }
            83%  { background: magenta; box-shadow: 0 0 30px magenta; }
            100% { background: red; box-shadow: 0 0 30px red; }
        }

        .image-box img {
            position: relative;
            z-index: 10;
            width: 240px; 
            height: auto;
            border-radius: 15px;
            animation: floating 6s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* =========================
           FOOTER
        ========================= */
        footer {
            text-align: center;
            padding: 40px 0;
            color: #00ffee;
            text-shadow: 0 0 10px rgba(0, 255, 238, 0.8);
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Mobile layout: Stacks vertically on small screens */
        @media(max-width: 1100px) {
            .content-grid {
                grid-template-columns: 1fr;
                row-gap: 30px;
            }
            .logo-container {
                grid-column: 1;
                grid-row: 1;
                margin-top: 20px;
            }
            .pick-1, .pick-2, .pick-3, .pick-4 {
                grid-column: 1;
                grid-row: auto;
            }
        }
    </style>
</head>

<body>

    <div class="nav-wrapper">
        <nav class="navbar">
            <a href="we-are-here.html">Who We Are</a>
            <a href="services.html">Guitar Services</a>
            <a href="priors.html">Prior Projects</a>
            <a href="forums.html">Guitar Forums</a>
        </nav>
    </div>

    <div class="main-container">
        <div class="content-grid">
            
            <!-- LEFT COLUMN -->
            <div class="image-box pick-1">
                <a href="index.html"><img src="./images/guitarshop.webp" alt="Shop"></a>
            </div>

            <div class="image-box pick-3">
                <a href="services.html"><img src="./images/guitar-repair.webp" alt="Repair"></a>
            </div>

            <!-- CENTER LOGO -->
            <div class="logo-container">
                <img src="./images/hippychipslogo.webp" alt="Logo">
            </div>

            <!-- RIGHT COLUMN -->
            <div class="image-box pick-2">
                <a href="forums.html"><img src="./images/guitarforums.webp" alt="Forums"></a>
            </div>

            <div class="image-box pick-4">
                <a href="priors.html"><img src="./images/priorprojects.webp" alt="Priors"></a>
            </div>

        </div>
    </div>

    <footer>
        © Copyright www.hippychipsguitars.com
    </footer>

</body>
</html>
