<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop - Inventory</title>
    <style>
        /* =========================
           GLOBAL & BACKGROUND
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            /* background-position changed to 70% to lower the image further below the nav bar */
            background: #000 url('images/shopbackground.webp') no-repeat center 70% fixed;
            background-size: cover;
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* =========================
           PERMANENT NAVBAR
        ========================= */
        nav {
            width: 100%;
            background-color: #000;
            padding: 10px 0;
            text-align: center;
            z-index: 2000;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        nav a:hover {
            color: #00ffee;
        }

        /* =========================
           LOGO & SEARCH AREA
        ========================= */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px 40px;
            z-index: 1000;
        }

        .logo-large img {
            width: 300px; 
            height: auto;
        }

        .search-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: rgba(45, 30, 20, 0.85); 
            padding: 15px 25px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 10px;
        }

        .category-row {
            display: flex;
            gap: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .cat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .cat-item input[type="radio"] {
            accent-color: #00ffee;
        }

        .search-bar {
            display: flex;
            gap: 5px;
        }

        .search-bar input {
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            width: 200px;
        }

        .search-bar button {
            padding: 8px 15px;
            background: #00ffee;
            border: none;
            border-radius: 4px;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        /* =========================
           SLIDER & LAYERS
        ========================= */
        .catalog-container {
            position: relative;
            width: 1040px; 
            height: 600px;
            margin-top: -60px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-view-window {
            position: absolute;
            top: 55px;   
            width: 880px;
            height: 380px;
            z-index: 50;
            overflow: hidden;
            background: #000;
            border-radius: 12px;
        }

        .thumbnail-window {
            position: absolute;
            bottom: 38px; 
            width: 790px;
            height: 95px;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        .thumb-placeholder {
            width: 32%; 
            height: 85%;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 255, 238, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00ffee;
            font-size: 0.8rem;
        }

        .catalog-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('images/slider.webp') center no-repeat;
            background-size: contain;
            z-index: 100; 
            pointer-events: none;
        }

        .nav-hitbox {
            position: absolute;
            top: 235px;
            width: 75px;
            height: 75px;
            z-index: 150; 
            cursor: pointer;
        }
        .prev-btn { left: 15px; }
        .next-btn { right: 15px; }

        /* =========================
           FOOTER
        ========================= */
        footer {
            margin-top: auto;
            /* bottom padding increased to 40px to raise the text up one row */
            padding: 20px 20px 40px 20px;
            color: #000000; 
            font-size: 0.75rem; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="#repairs">Repairs</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>

    <header>
        <div class="logo-large">
            <a href="index.html">
                <img src="images/hippychipslogo.webp" alt="Logo">
            </a>
        </div>

        <div class="search-area">
            <div class="category-row">
                <label class="cat-item"><input type="radio" name="cat" checked> Guitars</label>
                <label class="cat-item"><input type="radio" name="cat"> Parts</label>
                <label class="cat-item"><input type="radio" name="cat"> Merch</label>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search...">
                <button type="button">GO</button>
            </div>
        </div>
    </header>

    <main class="catalog-container">
        <div class="main-view-window"></div>

        <div class="thumbnail-window">
            <div class="thumb-placeholder">Part 1</div>
            <div class="thumb-placeholder">Part 2</div>
            <div class="thumb-placeholder">Part 3</div>
        </div>

        <div class="catalog-frame"></div>

        <div class="nav-hitbox prev-btn" id="prevBtn"></div>
        <div class="nav-hitbox next-btn" id="nextBtn"></div>
    </main>

    <footer>
        © Copyright www.hippychipsguitars.com
    </footer>

</body>
</html>
