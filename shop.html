<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop - Inventory</title>
    <style>
        /* =========================
           GLOBAL & BACKGROUND
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: url('./images/services-background.webp') center center/cover no-repeat fixed;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        /* HEADER ALIGNMENT (Based on image_2b4d03.jpg) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            position: relative;
            z-index: 2000;
        }

        .logo-small img {
            width: 80px; /* Sized down for header */
            height: auto;
        }

        .search-area {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }

        .category-row {
            display: flex;
            gap: 25px;
        }

        .cat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        .cat-item input[type="radio"] {
            accent-color: #00ffee;
            width: 18px;
            height: 18px;
        }

        .search-bar {
            display: flex;
            gap: 5px;
        }

        .search-bar input {
            padding: 12px 15px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            width: 280px;
        }

        .search-bar button {
            padding: 10px 20px;
            background: #00ffee;
            border: none;
            border-radius: 4px;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        /* =========================
           SLIDER STACKING LOGIC
        ========================= */
        .slider-section {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 80px;
            position: relative;
            height: 550px;
        }

        /* 1. THE HIDDEN LOGO (Lowest z-index) */
        .logo-hidden {
            position: absolute;
            z-index: 10;
            width: 450px;
            opacity: 1;
        }

        .logo-hidden img {
            width: 100%;
            height: auto;
        }

        /* 2. THE SLIDER CONTENT (Middle z-index) */
        .slider-content {
            position: absolute;
            width: 800px; /* Adjust to fit frame opening */
            height: 400px;
            z-index: 20; 
            overflow: hidden;
            background: #000;
        }

        .slides {
            display: flex;
            width: 300%;
            height: 100%;
            animation: slideShow 15s infinite ease-in-out;
        }

        .slide {
            width: 100%;
            height: 100%;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 3. THE FRAME (Highest z-index) */
        .slider-frame {
            position: absolute;
            width: 950px; 
            height: 520px;
            background: url('./images/slider.webp') center center/contain no-repeat;
            z-index: 30; /* Pulls frame to front to hide logo and clip slides */
            pointer-events: none; /* Allows interaction with slides if needed */
        }

        @keyframes slideShow {
            0%, 25% { transform: translateX(0); }
            33%, 58% { transform: translateX(-33.33%); }
            66%, 91% { transform: translateX(-66.66%); }
            100% { transform: translateX(0); }
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 50px 0;
            color: #00ffee;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 238, 0.6);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-small">
            <a href="index.html"><img src="./images/hippychipslogo.webp" alt="Home"></a>
        </div>

        <div class="search-area">
            <div class="category-row">
                <label class="cat-item">
                    <input type="radio" name="shop-cat" value="guitars" checked> Guitars
                </label>
                <label class="cat-item">
                    <input type="radio" name="shop-cat" value="parts"> Parts
                </label>
                <label class="cat-item">
                    <input type="radio" name="shop-cat" value="merch"> Merch
                </label>
            </div>

            <div class="search-bar">
                <input type="text" placeholder="Search the shop...">
                <button type="submit">GO</button>
            </div>
        </div>
    </header>

    <main>
        <section class="slider-section">
            
            <!-- Logo is first (Bottom) -->
            <div class="logo-hidden">
                <img src="./images/hippychipslogo.webp" alt="Underlay Logo">
            </div>

            <!-- Slides are second (Middle) -->
            <div class="slider-content">
                <div class="slides">
                    <div class="slide"><img src="./images/guitar-1.webp" alt="Inventory 1"></div>
                    <div class="slide"><img src="./images/guitar-2.webp" alt="Inventory 2"></div>
                    <div class="slide"><img src="./images/guitar-3.webp" alt="Inventory 3"></div>
                </div>
            </div>

            <!-- Frame is third (Top) -->
            <div class="slider-frame"></div>

        </section>
    </main>

    <footer>
        © Copyright www.hippychipsguitars.com
    </footer>

</body>
</html>
