<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop - Inventory</title>
    <style>
        /* =========================
           GLOBAL & BACKGROUND
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            /* Updated to match your exact filename in image_2ad93c.jpg */
            background: #000 url('./images/shopbackground.webp') center center/cover no-repeat fixed;
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* =========================
           HEADER & SEARCH
        ========================= */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .logo-small img {
            width: 70px;
            height: auto;
        }

        .search-area {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .category-row {
            display: flex;
            gap: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .cat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .cat-item input[type="radio"] {
            accent-color: #00ffee;
            width: 18px;
            height: 18px;
        }

        .search-bar {
            display: flex;
            gap: 5px;
        }

        .search-bar input {
            padding: 10px 15px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            width: 250px;
        }

        .search-bar button {
            padding: 10px 20px;
            background: #00ffee;
            border: none;
            border-radius: 4px;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        /* =========================
           SLIDER LAYERS
        ========================= */
        .catalog-container {
            position: relative;
            width: 1040px; 
            height: 600px;
            margin-top: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* MAIN PRODUCT WINDOW (Behind) */
        .main-view-window {
            position: absolute;
            top: 55px;   
            width: 880px;
            height: 380px;
            z-index: 50;
            overflow: hidden;
            background: #000;
            border-radius: 12px;
        }

        /* LOWER GALLERY WINDOW (Behind) */
        .thumbnail-window {
            position: absolute;
            bottom: 38px; 
            width: 790px;
            height: 95px;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        .thumb-placeholder {
            width: 32%; 
            height: 85%;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 255, 238, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00ffee;
            font-size: 0.8rem;
        }

        /* THE FRAME (On Top) */
        .catalog-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Updated to slider.webp from your file list */
            background: url('./images/slider.webp') center no-repeat;
            background-size: contain;
            z-index: 100; 
            pointer-events: none;
        }

        /* NAV TARGETS */
        .nav-hitbox {
            position: absolute;
            top: 235px;
            width: 75px;
            height: 75px;
            z-index: 150; 
            cursor: pointer;
        }
        .prev-btn { left: 15px; }
        .next-btn { right: 15px; }

        footer {
            margin-top: auto;
            padding: 30px;
            color: #00ffee;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-small">
            <a href="index.html">
                <!-- Updated to match hippychipslogo.webp in your explorer -->
                <img src="./images/hippychipslogo.webp" alt="Logo">
            </a>
        </div>

        <div class="search-area">
            <div class="category-row">
                <label class="cat-item"><input type="radio" name="cat" checked> Guitars</label>
                <label class="cat-item"><input type="radio" name="cat"> Parts</label>
                <label class="cat-item"><input type="radio" name="cat"> Merch</label>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search components...">
                <button type="button">GO</button>
            </div>
        </div>
    </header>

    <main class="catalog-container">
        <!-- Center Product -->
        <div class="main-view-window">
            <img src="./images/guitar-repair.webp" style="width:100%; height:100%; object-fit:cover;">
        </div>

        <!-- Lower Data Placeholders -->
        <div class="thumbnail-window">
            <div class="thumb-placeholder">Part 1</div>
            <div class="thumb-placeholder">Part 2</div>
            <div class="thumb-placeholder">Part 3</div>
        </div>

        <!-- Frame Overlay -->
        <div class="catalog-frame"></div>

        <!-- Nav Buttons -->
        <div class="nav-hitbox prev-btn"></div>
        <div class="nav-hitbox next-btn"></div>
    </main>

    <footer>
        © Copyright www.hippychipsguitars.com
    </footer>

</body>
</html>
