<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop - Inventory</title>
    <style>
        /* =========================
           GLOBAL & BACKGROUND
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            /* Wrap path in quotes to handle the space in your filename */
            background: #111 url('./images/shop background.webp') center center/cover no-repeat fixed;
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* =========================
           HEADER & SEARCH AREA
        ========================= */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 2000;
        }

        .logo-small img {
            width: 75px;
            height: auto;
        }

        .search-area {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .category-row {
            display: flex;
            gap: 25px;
        }

        .cat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            color: white;
        }

        /* The Radio Bullets */
        .cat-item input[type="radio"] {
            accent-color: #00ffee;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .search-bar {
            display: flex;
            gap: 5px;
        }

        .search-bar input {
            padding: 12px 15px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            width: 280px;
        }

        .search-bar button {
            padding: 10px 20px;
            background: #00ffee;
            border: none;
            border-radius: 4px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-bar button:hover {
            background: #00aaff;
            box-shadow: 0 0 15px #00ffee;
        }

        /* =========================
           DYNAMIC SLIDER LAYERING
        ========================= */
        .catalog-container {
            position: relative;
            width: 1040px; 
            height: 600px;
            margin-top: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 1. THE LOGO UNDERLAY (Hidden behind frame) */
        .logo-hidden {
            position: absolute;
            z-index: 10;
            width: 400px;
            opacity: 1;
        }
        .logo-hidden img {
            width: 100%;
            height: auto;
        }

        /* 2. MAIN WINDOW (Center Slot) */
        .main-view-window {
            position: absolute;
            top: 55px;   
            width: 880px;
            height: 380px;
            z-index: 50; /* Middle Layer */
            overflow: hidden;
            background: #000;
            border-radius: 12px;
        }

        .main-product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 3. THUMBNAIL WINDOW (Lower Slot) */
        .thumbnail-window {
            position: absolute;
            bottom: 38px; 
            width: 790px;
            height: 95px;
            z-index: 50; /* Middle Layer */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        .thumb-placeholder {
            width: 32%; 
            height: 90%;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(0, 255, 238, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
            color: #00ffee;
            text-transform: uppercase;
        }

        /* 4. THE FRAME OVERLAY (Top Layer) */
        /* Must use slider.png (transparent center) to show content behind it */
        .catalog-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('./images/slider.png') center no-repeat;
            background-size: contain;
            z-index: 100; 
            pointer-events: none; /* Click through frame to nav buttons */
        }

        /* 5. NAV CONTROLS */
        .nav-hitbox {
            position: absolute;
            top: 235px;
            width: 75px;
            height: 75px;
            z-index: 150; 
            cursor: pointer;
            border-radius: 50%;
        }
        .prev-btn { left: 15px; }
        .next-btn { right: 15px; }

        /* =========================
           FOOTER
        ========================= */
        footer {
            margin-top: auto;
            padding: 40px;
            color: #00ffee;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 238, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-small">
            <a href="index.html">
                <img src="./images/hippychipslogo.webp" alt="Hippy Chips Logo">
            </a>
        </div>

        <div class="search-area">
            <div class="category-row">
                <label class="cat-item">
                    <input type="radio" name="shop-cat" value="guitars" checked> Guitars
                </label>
                <label class="cat-item">
                    <input type="radio" name="shop-cat" value="parts"> Parts
                </label>
                <label class="cat-item">
                    <input type="radio" name="shop-cat" value="merch"> Merch
                </label>
            </div>

            <div class="search-bar">
                <input type="text" placeholder="Search the shop...">
                <button type="submit">GO</button>
            </div>
        </div>
    </header>

    <main class="catalog-container">
        
        <!-- Logo tucked behind frame at the bottom of the stack -->
        <div class="logo-hidden">
            <img src="./images/hippychipslogo.webp" alt="Underlay Logo">
        </div>

        <!-- Main Product Window -->
        <div class="main-view-window">
            <img src="./images/guitar-1.webp" class="main-product-img" id="mainImage" alt="Main Inventory Item">
        </div>

        <!-- Lower Thumbnail Window for database feed -->
        <div class="thumbnail-window" id="thumbContainer">
            <div class="thumb-placeholder"><span>Product Slot 1</span></div>
            <div class="thumb-placeholder"><span>Active Selection</span></div>
            <div class="thumb-placeholder"><span>Product Slot 3</span></div>
        </div>

        <!-- Top Frame Layer -->
        <div class="catalog-frame"></div>

        <!-- Nav Targets (Positioned over the dials in your graphic) -->
        <div class="nav-hitbox prev-btn" id="prevBtn" title="Previous"></div>
        <div class="nav-hitbox next-btn" id="nextBtn" title="Next"></div>

    </main>

    <footer>
        © Copyright www.hippychipsguitars.com
    </footer>

    <script>
        // Placeholder for Database Integration
        document.getElementById('prevBtn').onclick = function() {
            console.log("Database Hook: Load Previous Item");
        };

        document.getElementById('nextBtn').onclick = function() {
            console.log("Database Hook: Load Next Item");
        };
    </script>

</body>
</html>
