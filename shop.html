<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop - Inventory</title>
    <style>
        /* =========================
           GLOBAL & BACKGROUND
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            /* Using services-background.webp as requested */
            background: url('./images/services-background.webp') center center/cover no-repeat fixed;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        /* =========================
           HEADER & SEARCH SECTION
        ========================= */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px 50px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }

        .logo-small img {
            width: 150px;
            height: auto;
        }

        /* SEARCH CONTROLS (Top Right) */
        .search-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        /* Category Row with Bullets */
        .category-row {
            display: flex;
            gap: 20px;
        }

        .cat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Custom Radio Style (The Bullet) */
        .cat-item input[type="radio"] {
            accent-color: #00ffee; /* Cyan bullet to match your theme */
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .search-bar {
            display: flex;
            gap: 5px;
        }

        .search-bar input {
            padding: 10px 15px;
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            width: 250px;
        }

        .search-bar button {
            padding: 10px 20px;
            background: #00ffee;
            border: none;
            border-radius: 5px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-bar button:hover {
            background: #00aaff;
            box-shadow: 0 0 15px #00ffee;
        }

        /* =========================
           SLIDER SECTION
        ========================= */
        .slider-section {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 50px;
            position: relative;
        }

        /* The Frame (slider.webp) */
        .slider-frame {
            position: relative;
            width: 900px; /* Adjust based on your slider.webp dimensions */
            height: 500px;
            background: url('./images/slider.webp') center center/contain no-repeat;
            z-index: 10;
            pointer-events: none; /* Allows clicking through frame to slides */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Content inside the frame */
        .slider-content {
            position: absolute;
            width: 820px; /* Sized to fit inside the frame opening */
            height: 420px;
            z-index: 5;
            overflow: hidden;
            border-radius: 10px;
            background: #111;
        }

        .slides {
            display: flex;
            width: 300%;
            height: 100%;
            animation: slideAnimation 12s infinite ease-in-out;
        }

        .slide {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes slideAnimation {
            0%, 25% { transform: translateX(0); }
            33%, 58% { transform: translateX(-33.33%); }
            66%, 91% { transform: translateX(-66.66%); }
            100% { transform: translateX(0); }
        }

        footer {
            text-align: center;
            padding: 40px;
            font-weight: bold;
            color: #00ffee;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-small">
            <a href="index.html"><img src="./images/hippychipslogo.webp" alt="Logo"></a>
        </div>

        <div class="search-container">
            <!-- Category choices with Bullet (Radio) logic -->
            <div class="category-row">
                <label class="cat-item">
                    <input type="radio" name="shop-cat" value="guitars" checked> Guitars
                </label>
                <label class="cat-item">
                    <input type="radio" name="shop-cat" value="parts"> Parts
                </label>
                <label class="cat-item">
                    <input type="radio" name="shop-cat" value="merch"> Merch
                </label>
            </div>

            <div class="search-bar">
                <input type="text" placeholder="Search the shop...">
                <button type="submit">GO</button>
            </div>
        </div>
    </header>

    <main>
        <section class="slider-section">
            <!-- The physical frame asset overlaying the slider -->
            <div class="slider-frame">
                <div class="slider-content">
                    <div class="slides">
                        <div class="slide"><img src="./images/guitar-1.webp" alt="Featured Guitar 1"></div>
                        <div class="slide"><img src="./images/guitar-2.webp" alt="Featured Guitar 2"></div>
                        <div class="slide"><img src="./images/guitar-3.webp" alt="Featured Guitar 3"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        © Copyright www.hippychipsguitars.com
    </footer>

</body>
</html>
