<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop - Inventory</title>
    <style>
        /* =========================
           GLOBAL & NO-SCROLL
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            background: #000 url('images/shopbackground.webp') no-repeat center 50px fixed;
            background-size: cover;
            height: 100vh; 
            width: 100vw;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; 
        }

        /* =========================
           NAVBAR WITH SEARCH
        ========================= */
        nav {
            width: 100%;
            background-color: #000;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .nav-links a:hover {
            color: #00ffee;
        }

        .nav-search {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-categories {
            display: flex;
            gap: 10px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .nav-categories label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .nav-search-bar {
            display: flex;
            gap: 5px;
        }

        .nav-search-bar input {
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #333;
            background: #111;
            color: white;
            width: 150px;
            font-size: 0.8rem;
        }

        .nav-search-bar button {
            padding: 4px 10px;
            background: #00ffee;
            border: none;
            border-radius: 4px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* =========================
           LOGO AREA
        ========================= */
        header {
            width: 100%;
            padding: 10px 40px;
            z-index: 1000;
            flex-shrink: 0;
        }

        .logo-large img {
            width: 180px; 
            height: auto;
        }

        /* =========================
           RESIZED SLIDER
        ========================= */
        .catalog-container {
            position: relative;
            flex-grow: 1; 
            width: 650px; 
            height: 360px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 70px; 
        }

        /* Fine-tuned to fit perfectly behind slider.webp */
        .main-view-window {
            position: absolute;
            /* Adjust top and width/height to center inside the frame graphic */
            top: 45px;   
            width: 535px; 
            height: 235px; 
            z-index: 50;
            overflow: hidden;
            background: #000;
            border-radius: 10px; /* Matched to the rounded inner frame */
        }

        .catalog-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('images/slider.webp') center no-repeat;
            background-size: contain;
            z-index: 100; 
            pointer-events: none;
        }

        /* =========================
           STYLED FOOTER
        ========================= */
        footer {
            width: 100%;
            text-align: center;
            padding: 15px 0;
            background: rgba(255, 255, 255, 0.45); 
            backdrop-filter: blur(5px);
            color: #000; 
            font-size: 0.9rem; 
            font-weight: bold;
            letter-spacing: 1px;
            flex-shrink: 0;
            z-index: 1000;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="#repairs">Repairs</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </div>

        <div class="nav-search">
            <div class="nav-categories">
                <label><input type="radio" name="cat" checked> GUITARS</label>
                <label><input type="radio" name="cat"> PARTS</label>
                <label><input type="radio" name="cat"> MERCH</label>
            </div>
            <div class="nav-search-bar">
                <input type="text" placeholder="Search...">
                <button type="button">GO</button>
            </div>
        </div>
    </nav>

    <header>
        <div class="logo-large">
            <a href="index.html">
                <img src="images/hippychipslogo.webp" alt="Logo">
            </a>
        </div>
    </header>

    <main class="catalog-container">
        <div class="main-view-window"></div>
        <div class="catalog-frame"></div>
    </main>

    <footer>
        &copy; Copyright www.hippychipsguitars.com
    </footer>

</body>
</html>
