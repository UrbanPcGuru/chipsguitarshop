<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop - Inventory</title>
    <style>
        /* =========================
           GLOBAL & NO-SCROLL
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            /* background-position changed to 'center 85px' to start exactly below the nav bar */
            background: #000 url('images/shopbackground.webp') no-repeat center 85px fixed;
            background-size: cover;
            height: 100vh; /* Fixed height for no-scroll */
            width: 100vw;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; /* Disables scrolling */
        }

        /* =========================
           PERMANENT NAVBAR
        ========================= */
        nav {
            width: 100%;
            background-color: #000;
            padding: 15px 0;
            text-align: center;
            z-index: 2000;
            flex-shrink: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1.1rem;
        }

        nav a:hover {
            color: #00ffee;
        }

        /* =========================
           LOGO & SEARCH AREA
        ========================= */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 40px;
            z-index: 1000;
            flex-shrink: 0;
        }

        .logo-large img {
            width: 300px; 
            height: auto;
        }

        .search-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7); 
            padding: 12px 20px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .category-row {
            display: flex;
            gap: 15px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .cat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .search-bar {
            display: flex;
            gap: 5px;
        }

        .search-bar input {
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            width: 180px;
        }

        .search-bar button {
            padding: 6px 12px;
            background: #00ffee;
            border: none;
            border-radius: 4px;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        /* =========================
           SLIDER CONTAINER
        ========================= */
        .catalog-container {
            position: relative;
            flex-grow: 1; /* Takes up remaining space between header and footer */
            width: 1040px; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: -20px; /* Pulls up slightly to stay centered */
        }

        .main-view-window {
            position: absolute;
            top: 55px;   
            width: 880px;
            height: 380px;
            z-index: 50;
            overflow: hidden;
            background: #000;
            border-radius: 12px;
        }

        .catalog-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('images/slider.webp') center no-repeat;
            background-size: contain;
            z-index: 100; 
            pointer-events: none;
        }

        /* =========================
           FOOTER - Fixed at Bottom
        ========================= */
        footer {
            width: 100%;
            text-align: center;
            padding-bottom: 15px; /* Adjust this to move the text up/down */
            color: #000000; 
            font-size: 0.8rem; 
            font-weight: bold;
            flex-shrink: 0;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="#repairs">Repairs</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>

    <header>
        <div class="logo-large">
            <a href="index.html">
                <img src="images/hippychipslogo.webp" alt="Logo">
            </a>
        </div>

        <div class="search-area">
            <div class="category-row">
                <label class="cat-item"><input type="radio" name="cat" checked> GUITARS</label>
                <label class="cat-item"><input type="radio" name="cat"> PARTS</label>
                <label class="cat-item"><input type="radio" name="cat"> MERCH</label>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search...">
                <button type="button">GO</button>
            </div>
        </div>
    </header>

    <main class="catalog-container">
        <div class="main-view-window"></div>
        <div class="catalog-frame"></div>
    </main>

    <footer>
        © Copyright www.hippychipsguitars.com
    </footer>

</body>
</html>
