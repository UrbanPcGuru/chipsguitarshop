<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippy Chip's Guitar Shop - Component Catalog</title>
    <style>
        /* =========================
           GLOBAL SETUP & BACKGROUND
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            /* QUOTES ARE MANDATORY HERE FOR THE SPACE IN FILENAME */
            background: #000 url('./images/shop background.webp') center center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            overflow-x: hidden;
        }

        /* =========================
           HEADER & SEARCH
        ========================= */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .logo-small img {
            width: 70px;
            height: auto;
        }

        .search-area {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .category-row {
            display: flex;
            gap: 20px;
        }

        .cat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        .cat-item input[type="radio"] {
            accent-color: #00ffee;
            width: 18px;
            height: 18px;
        }

        .search-bar {
            display: flex;
            gap: 5px;
        }

        .search-bar input {
            padding: 10px 15px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            width: 250px;
        }

        .search-bar button {
            padding: 10px 20px;
            background: #00ffee;
            border: none;
            border-radius: 4px;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        /* =========================
           DYNAMIC SLIDER WRAPPER
        ========================= */
        .catalog-container {
            position: relative;
            width: 1040px; 
            height: 600px;
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* THE PHYSICAL FRAME OVERLAY (slider.webp) */
        /* Must have transparent centers to work */
        .catalog-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('./images/slider.webp') center no-repeat;
            background-size: contain;
            z-index: 100; 
            pointer-events: none;
        }

        /* MAIN PRODUCT DISPLAY (Behind the top window) */
        .main-view-window {
            position: absolute;
            top: 55px;   
            width: 880px;
            height: 380px;
            z-index: 50;
            overflow: hidden;
            background: #000;
            border-radius: 12px;
        }

        .main-product-placeholder {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* LOWER GALLERY (Behind the bottom thumbnails) */
        .thumbnail-window {
            position: absolute;
            bottom: 38px; 
            width: 790px;
            height: 95px;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        .thumb-placeholder {
            width: 32%; 
            height: 85%;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 255, 238, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
            color: #00ffee;
            text-transform: uppercase;
        }

        /* NAV OVERLAYS */
        .nav-hitbox {
            position: absolute;
            top: 235px;
            width: 70px;
            height: 70px;
            z-index: 150; 
            cursor: pointer;
            border-radius: 50%;
        }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        footer {
            margin-top: auto;
            padding: 30px;
            color: #00ffee;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 238, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-small">
            <a href="index.html">
                <img src="./images/hippychipslogo.webp" alt="Hippy Chips Logo">
            </a>
        </div>

        <div class="search-area">
            <div class="category-row">
                <label class="cat-item">
                    <input type="radio" name="shop-cat" value="guitars" checked> Guitars
                </label>
                <label class="cat-item">
                    <input type="radio" name="shop-cat" value="parts"> Parts
                </label>
                <label class="cat-item">
                    <input type="radio" name="shop-cat" value="merch"> Merch
                </label>
            </div>

            <div class="search-bar">
                <input type="text" placeholder="Search the shop...">
                <button type="submit">GO</button>
            </div>
        </div>
    </header>

    <main class="catalog-container">
        <!-- Images Behind -->
        <div class="main-view-window">
            <!-- Placeholder for Main Database Image -->
            <img src="./images/guitar-1.webp" class="main-product-placeholder" alt="Main View">
        </div>

        <div class="thumbnail-window">
            <div class="thumb-placeholder">
                <span>Part A</span>
                <small>In Stock</small>
            </div>
            <div class="thumb-placeholder">
                <span>Part B</span>
                <small>Custom Built</small>
            </div>
            <div class="thumb-placeholder">
                <span>Part C</span>
                <small>Aged Copper</small>
            </div>
        </div>

        <!-- The Frame on Top -->
        <div class="catalog-frame"></div>

        <!-- Clicking the dials -->
        <div class="nav-hitbox prev-btn" title="Previous"></div>
        <div class="nav-hitbox next-btn" title="Next"></div>
    </main>

    <footer>
        © Copyright www.hippychipsguitars.com
    </footer>

</body>
</html>
