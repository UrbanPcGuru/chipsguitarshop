<style>
    /* =========================
       DYNAMIC SLIDER WRAPPER
    ========================= */
    .catalog-container {
        position: relative;
        width: 1040px; /* Adjusted to match slider.jpg proportions */
        height: 600px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* THE PHYSICAL FRAME OVERLAY (slider.jpg) */
    /* This must be a PNG or WebP with transparency in the center */
    .catalog-frame {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url('./images/slider.png') center no-repeat;
        background-size: contain;
        z-index: 100; /* Stays on top */
        pointer-events: none;
    }

    /* MAIN PRODUCT DISPLAY (Behind the top window) */
    .main-view-window {
        position: absolute;
        top: 55px;   /* Alignment for the main large window */
        width: 880px;
        height: 400px;
        z-index: 50;
        overflow: hidden;
        background: #1a1a1a; /* Backup color if image fails */
    }

    .main-product-placeholder {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* LOWER GALLERY (Behind the bottom thumbnails) */
    .thumbnail-window {
        position: absolute;
        bottom: 35px; /* Alignment for the smaller bottom bar */
        width: 780px;
        height: 100px;
        z-index: 50;
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 0 10px;
    }

    .thumb-placeholder {
        width: 240px; /* Sized to match the 3 slots in slider.jpg */
        height: 80px;
        background: rgba(0, 255, 238, 0.05);
        border: 1px solid rgba(0, 255, 238, 0.2);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 0.7rem;
        color: #00ffee;
        text-transform: uppercase;
    }

    /* INTERACTIVE OVERLAYS (Navigation Arrows) */
    .nav-hitbox {
        position: absolute;
        top: 240px;
        width: 60px;
        height: 60px;
        z-index: 150; /* Above the frame */
        cursor: pointer;
        border-radius: 50%;
        /* Use background: rgba(255,0,0,0.5) to debug placement */
    }
    .prev-btn { left: 15px; }
    .next-btn { right: 15px; }

</style>

<div class="catalog-container">
    <!-- 1. The Dynamic Data Layers (Behind) -->
    <div class="main-view-window">
        <!-- Placeholder for Main Database Image -->
        <img src="./images/placeholder-main-bridge.webp" class="main-product-placeholder" alt="Main View">
    </div>

    <div class="thumbnail-window">
        <!-- Placeholders for Database Row Thumbnails -->
        <div class="thumb-placeholder">
            <span>Product A</span>
            <small>Data Placeholder</small>
        </div>
        <div class="thumb-placeholder">
            <span>Product B</span>
            <small>Active Selection</small>
        </div>
        <div class="thumb-placeholder">
            <span>Product C</span>
            <small>Data Placeholder</small>
        </div>
    </div>

    <!-- 2. The Transparent Frame (On Top) -->
    <div class="catalog-frame"></div>

    <!-- 3. Invisible Clickable Nav Areas -->
    <div class="nav-hitbox prev-btn" onclick="prevProduct()"></div>
    <div class="nav-hitbox next-btn" onclick="nextProduct()"></div>
</div>
